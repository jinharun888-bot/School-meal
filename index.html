<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 급식 메이트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .theme-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 테마 색상 클래스 */
        .theme-default { background-color: #f1f5f9; color: #1e293b; }
        .theme-blue { background-color: #e0f2fe; color: #0c4a6e; }
        .theme-green { background-color: #dcfce7; color: #064e3b; }
        .theme-pink { background-color: #fce7f3; color: #831843; }
        .theme-amber { background-color: #fef3c7; color: #78350f; }
        .theme-purple { background-color: #f3e8ff; color: #581c87; }
        .theme-dark { background-color: #0f172a; color: #f8fafc; }
        .theme-dark .glass-card { background: rgba(30, 41, 59, 0.8); border-color: rgba(255,255,255,0.1); color: #f8fafc; }
        
        .nav-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }
        .nav-btn:active { transform: scale(0.92); }
        
        .error-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .star-active { color: #fbbf24; transform: scale(1.1); }
    </style>
</head>
<body class="theme-default min-h-screen pb-12 theme-transition">
    <header class="p-6 flex justify-between items-center max-w-md mx-auto">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">AI 급식 메이트</h1>
            <p class="text-sm opacity-70" id="currentDateDisplay"></p>
        </div>
        <button id="settingsBtn" class="p-2 rounded-full hover:bg-black/5 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-6">
        <section class="glass-card rounded-3xl p-6 shadow-xl">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold uppercase tracking-wider mb-1 block opacity-60">학교 검색</label>
                    <input type="text" id="schoolInput" placeholder="학교 이름을 입력하세요" 
                        class="w-full bg-transparent border-b-2 border-current/20 py-2 focus:outline-none focus:border-current transition-colors text-lg">
                    <p id="errorMessage" class="text-xs text-red-500 mt-2 font-bold hidden">학교명을 다시 작성해 주세요</p>
                </div>
                <div>
                    <label class="text-xs font-bold uppercase tracking-wider mb-1 block opacity-60">날짜 선택</label>
                    <input type="date" id="dateInput" class="w-full bg-transparent border-b-2 border-current/20 py-2 focus:outline-none focus:border-current transition-colors text-lg">
                </div>
                <button id="searchBtn" class="w-full bg-black text-white dark:bg-white dark:text-black py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
                    급식 조회하기
                </button>
            </div>
        </section>

        <div id="loading" class="hidden">
            <div class="flex flex-col items-center justify-center py-12 space-y-4">
                <div class="w-10 h-10 border-4 border-current/20 border-t-current rounded-full animate-spin"></div>
                <p class="font-medium">정보를 불러오는 중...</p>
            </div>
        </div>

        <section id="noMeal" class="hidden animate-in fade-in zoom-in duration-300">
            <div class="glass-card rounded-3xl p-10 text-center space-y-6">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-current/5 rounded-full mb-2">
                    <svg class="w-10 h-10 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-xl font-bold">오늘의 급식은 없습니다</h2>
                <p class="text-sm opacity-60">주말, 공휴일 또는 방학 기간입니다.</p>
                
                <div class="flex justify-center gap-3 pt-4">
                    <button onclick="changeDate(-1)" class="nav-btn px-5 py-3 rounded-2xl flex items-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        <span class="text-sm font-bold">어제 식단</span>
                    </button>
                    <button onclick="changeDate(1)" class="nav-btn px-5 py-3 rounded-2xl flex items-center space-x-2">
                        <span class="text-sm font-bold">내일 식단</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="result" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <!-- Navigation & Rating -->
            <div class="flex flex-col space-y-4 mb-6">
                <div class="flex items-center justify-between bg-current/5 p-4 rounded-3xl">
                    <!-- 왼쪽: 어제 -->
                    <button onclick="changeDate(-1)" class="nav-btn p-3 rounded-2xl shadow-sm flex flex-col items-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        <span class="text-[10px] font-bold mt-1">어제</span>
                    </button>

                    <div class="flex flex-col items-center">
                        <p class="text-[9px] font-bold uppercase tracking-widest opacity-50 mb-1">Satisfied?</p>
                        <div class="flex gap-1" id="starRating"></div>
                    </div>

                    <!-- 오른쪽: 내일 -->
                    <button onclick="changeDate(1)" class="nav-btn p-3 rounded-2xl shadow-sm flex flex-col items-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        <span class="text-[10px] font-bold mt-1">내일</span>
                    </button>
                </div>
            </div>

            <!-- Nutrients -->
            <div class="grid grid-cols-1 gap-4 mb-6">
                <div class="glass-card p-4 rounded-2xl text-center shadow-sm">
                    <p class="text-[10px] font-bold uppercase tracking-wider opacity-60 mb-1">Calories</p>
                    <p class="text-xl font-bold" id="calDisplay">-- kcal</p>
                </div>
            </div>

            <!-- List Display: 급식 내용(식단) -->
            <div class="glass-card p-6 rounded-3xl shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="listTitle" class="text-sm font-bold uppercase tracking-wider opacity-60 flex items-center">
                        <span id="titleText">식단 구성 메뉴</span>
                    </h3>
                    <button id="toggleListBtn" class="text-xs font-bold px-3 py-1.5 rounded-full bg-current/10 hover:bg-current/20 transition-colors">
                        식재료 보기
                    </button>
                </div>
                <div id="menuList" class="space-y-3">
                    <!-- 급식 메뉴들이 여기에 렌더링됨 -->
                </div>
            </div>
        </section>
    </main>

    <div id="themeModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="modalOverlay"></div>
        <div class="glass-card w-full max-w-xs rounded-3xl p-6 relative z-10 animate-in zoom-in-95 duration-200">
            <h3 class="text-lg font-bold mb-6">배경 테마 선택</h3>
            <div class="grid grid-cols-4 gap-4">
                <button onclick="setTheme('default')" class="w-10 h-10 rounded-full bg-[#f1f5f9] border border-gray-300"></button>
                <button onclick="setTheme('blue')" class="w-10 h-10 rounded-full bg-[#e0f2fe] border border-gray-300"></button>
                <button onclick="setTheme('green')" class="w-10 h-10 rounded-full bg-[#dcfce7] border border-gray-300"></button>
                <button onclick="setTheme('pink')" class="w-10 h-10 rounded-full bg-[#fce7f3] border border-gray-300"></button>
                <button onclick="setTheme('amber')" class="w-10 h-10 rounded-full bg-[#fef3c7] border border-gray-300"></button>
                <button onclick="setTheme('purple')" class="w-10 h-10 rounded-full bg-[#f3e8ff] border border-gray-300"></button>
                <button onclick="setTheme('dark')" class="w-10 h-10 rounded-full bg-[#0f172a] border border-gray-300"></button>
            </div>
            <button id="closeModal" class="mt-8 w-full py-3 bg-current/10 rounded-xl font-bold text-sm">닫기</button>
        </div>
    </div>

    <script>
        const schoolInput = document.getElementById('schoolInput');
        const dateInput = document.getElementById('dateInput');
        const searchBtn = document.getElementById('searchBtn');
        const errorMessage = document.getElementById('errorMessage');
        const resultSection = document.getElementById('result');
        const noMealSection = document.getElementById('noMeal');
        const loading = document.getElementById('loading');
        const calDisplay = document.getElementById('calDisplay');
        const menuList = document.getElementById('menuList');
        const starRatingContainer = document.getElementById('starRating');
        const toggleListBtn = document.getElementById('toggleListBtn');
        const titleText = document.getElementById('titleText');
        const settingsBtn = document.getElementById('settingsBtn');
        const themeModal = document.getElementById('themeModal');
        const closeModal = document.getElementById('closeModal');
        const modalOverlay = document.getElementById('modalOverlay');
        
        let currentRating = 0;
        let currentMenuData = [];
        let currentIngredientData = [];
        let isShowingIngredients = false;

        // 테마 설정
        function setTheme(theme) {
            const body = document.body;
            body.classList.remove('theme-default', 'theme-blue', 'theme-green', 'theme-pink', 'theme-amber', 'theme-purple', 'theme-dark');
            body.classList.add(`theme-${theme}`);
            localStorage.setItem('user-theme', theme);
            themeModal.classList.add('hidden');
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
            updateDateDisplay(new Date());
            const savedTheme = localStorage.getItem('user-theme') || 'default';
            setTheme(savedTheme);
            initStars();
        };

        function updateDateDisplay(dateObj) {
            document.getElementById('currentDateDisplay').textContent = dateObj.toLocaleDateString('ko-KR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        // 날짜 변경 함수 (왼쪽: 어제 -1, 오른쪽: 내일 +1)
        function changeDate(days) {
            const currentDate = new Date(dateInput.value);
            currentDate.setDate(currentDate.getDate() + days);
            const newDateStr = currentDate.toISOString().split('T')[0];
            dateInput.value = newDateStr;
            updateDateDisplay(currentDate);
            getMeal();
        }

        settingsBtn.onclick = () => themeModal.classList.remove('hidden');
        closeModal.onclick = () => themeModal.classList.add('hidden');
        modalOverlay.onclick = () => themeModal.classList.add('hidden');

        async function getMeal() {
            const schoolName = schoolInput.value.trim();
            const date = dateInput.value.replace(/-/g, '');

            if (!schoolName) {
                errorMessage.classList.remove('hidden');
                schoolInput.classList.add('border-red-500', 'error-shake');
                setTimeout(() => schoolInput.classList.remove('error-shake'), 500);
                return;
            }

            errorMessage.classList.add('hidden');
            schoolInput.classList.remove('border-red-500');
            loading.classList.remove('hidden');
            resultSection.classList.add('hidden');
            noMealSection.classList.add('hidden');

            try {
                // 1. 학교 정보 검색 (학교 코드 획득)
                const schoolRes = await fetch(`https://open.neis.go.kr/hub/schoolInfo?Type=json&SCHUL_NM=${encodeURIComponent(schoolName)}`);
                const schoolData = await schoolRes.json();

                if (!schoolData.schoolInfo) {
                    loading.classList.add('hidden');
                    errorMessage.textContent = "학교를 찾을 수 없습니다.";
                    errorMessage.classList.remove('hidden');
                    return;
                }

                const schoolCode = schoolData.schoolInfo[1].row[0].SD_SCHUL_CODE;
                const atptCode = schoolData.schoolInfo[1].row[0].ATPT_OFCDC_SC_CODE;

                // 2. 급식 정보 검색
                const mealRes = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${atptCode}&SD_SCHUL_CODE=${schoolCode}&MLSV_YMD=${date}`);
                const mealData = await mealRes.json();

                if (!mealData.mealServiceDietInfo) {
                    loading.classList.add('hidden');
                    noMealSection.classList.remove('hidden');
                    return;
                }
                
                const meal = mealData.mealServiceDietInfo[1].row[0];
                
                // 데이터 파싱 (알레르기 숫자 제거 등)
                currentMenuData = meal.DDISH_NM.split('<br/>').map(item => item.replace(/\([0-9.]+\)/g, '').trim());
                currentIngredientData = meal.ORGR_INFO ? meal.ORGR_INFO.split('<br/>').map(item => item.trim()) : ["식재료 정보가 없습니다."];
                
                isShowingIngredients = false;
                renderContent(); // 급식 내용 렌더링
                
                calDisplay.textContent = meal.CAL_INFO;

                resultSection.classList.remove('hidden');
                resetRating(); // 날짜 바뀔 때 별점 초기화

            } catch (err) {
                console.error(err);
                loading.classList.add('hidden');
                errorMessage.textContent = "정보를 가져오는 중 오류가 발생했습니다.";
                errorMessage.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderContent() {
            const data = isShowingIngredients ? currentIngredientData : currentMenuData;
            titleText.textContent = isShowingIngredients ? "식재료 상세 정보" : "식단 구성 메뉴";
            toggleListBtn.textContent = isShowingIngredients ? "메뉴 보기" : "식재료 보기";

            menuList.innerHTML = data.map(item => `
                <div class="flex items-center space-x-3 py-1.5 animate-in fade-in slide-in-from-left-2 duration-300">
                    <span class="w-1.5 h-1.5 rounded-full bg-current opacity-40"></span>
                    <span class="text-base font-medium">${item}</span>
                </div>
            `).join('');
        }

        toggleListBtn.onclick = () => {
            isShowingIngredients = !isShowingIngredients;
            renderContent();
        };

        searchBtn.onclick = getMeal;

        function initStars() {
            starRatingContainer.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const star = document.createElement('button');
                star.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;
                star.className = "text-gray-300 transition-all duration-200 hover:scale-110";
                star.onclick = () => setRating(i);
                starRatingContainer.appendChild(star);
            }
        }

        function setRating(rating) {
            currentRating = rating;
            const stars = starRatingContainer.children;
            for (let i = 0; i < 5; i++) {
                if (i < rating) {
                    stars[i].classList.add('star-active');
                    stars[i].classList.remove('text-gray-300');
                } else {
                    stars[i].classList.remove('star-active');
                    stars[i].classList.add('text-gray-300');
                }
            }
        }

        function resetRating() {
            currentRating = 0;
            const stars = starRatingContainer.children;
            for (let i = 0; i < stars.length; i++) {
                stars[i].classList.remove('star-active');
                stars[i].classList.add('text-gray-300');
            }
        }
    </script>
</body>
</html>
